<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sumi | process monitor</title>
    <style>
      :root {
        --bg: #0d1117;
        --panel-bg: #161b22;
        --border: #30363d;
        --text: #c9d1d9;
        --stdout: #7ee787;
        --stderr: #ff7b72;
        --dim: #8b949e;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: var(--bg);
        color: var(--text);
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        overflow: hidden;
      }

      .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        height: 100vh;
        gap: 1px;
        background-color: var(--border);
      }

      .panel {
        display: flex;
        flex-direction: column;
        background-color: var(--panel-bg);
        overflow: hidden;
      }

      .header {
        padding: 10px 15px;
        background-color: var(--bg);
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header h2 {
        margin: 0;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .stdout-header h2 {
        color: var(--stdout);
      }
      .stderr-header h2 {
        color: var(--stderr);
      }

      .log-container {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        font-size: 13px;
        line-height: 1.5;
        scroll-behavior: smooth;
      }

      .log-entry {
        margin-bottom: 4px;
        white-space: pre-wrap;
        word-break: break-all;
        border-left: 2px solid transparent;
        padding-left: 8px;
      }

      .log-entry.stdout {
        border-left-color: var(--stdout);
      }
      .log-entry.stderr {
        border-left-color: var(--stderr);
      }

      .timestamp {
        color: var(--dim);
        margin-right: 8px;
        font-size: 11px;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #484f58;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="panel">
        <div class="header stdout-header">
          <h2>Standard Output</h2>
          <span id="stdout-count" style="font-size: 10px; color: var(--dim)"
            >0 lines</span
          >
        </div>
        <div id="stdout-logs" class="log-container"></div>
      </div>
      <div class="panel">
        <div class="header stderr-header">
          <h2>Standard Error</h2>
          <span id="stderr-count" style="font-size: 10px; color: var(--dim)"
            >0 lines</span
          >
        </div>
        <div id="stderr-logs" class="log-container"></div>
      </div>
    </div>

    <script>
      const stdoutLogs = document.getElementById("stdout-logs");
      const stderrLogs = document.getElementById("stderr-logs");
      const stdoutCount = document.getElementById("stdout-count");
      const stderrCount = document.getElementById("stderr-count");

      let outCount = 0;
      let errCount = 0;

      const socket = new WebSocket(`ws://${window.location.host}/ws`);

      socket.onmessage = function (event) {
        const data = JSON.parse(event.data);
        const message = data.message;
        const source = data.source;

        const timestamp = new Date().toLocaleTimeString();
        const logEntry = document.createElement("div");
        logEntry.className = "log-entry";
        logEntry.innerHTML = `<span class="timestamp">[${timestamp}]</span>${message}`;

        if (source === "stderr") {
          appendLog(stderrLogs, logEntry, "stderr");
          errCount++;
          stderrCount.innerText = `${errCount} lines`;
        } else {
          appendLog(stdoutLogs, logEntry, "stdout");
          outCount++;
          stdoutCount.innerText = `${outCount} lines`;
        }
      };

      function appendLog(container, element, type) {
        element.classList.add(type);
        container.appendChild(element);
        container.scrollTop = container.scrollHeight;
      }

      socket.onopen = () => console.log("Connected to sumi");
      socket.onclose = () => console.log("Disconnected from sumi");
    </script>
  </body>
</html>
